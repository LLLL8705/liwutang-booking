services:
  - type: web
    name: liwutang-booking
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: liwutang-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: STAFF_USERNAME
        sync: false
      - key: STAFF_PASSWORD
        sync: false
      - key: STAFF_ROLE
        value: admin
      - key: PAYMENT_ENABLED
        value: "false"
